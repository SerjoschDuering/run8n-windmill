summary: Fetch features from Overture Maps
description: >-
  Fetches features from Overture Maps — all 15 types across 6 themes (buildings,
  land, water, infrastructure, transport, places, addresses, etc.). Free, no
  auth needed. Sources: Google + Microsoft + OSM combined. Returns GeoJSON
  FeatureCollection or S3 reference.
lock: '!inline f/geo/fetchers/overture.script.lock'
kind: script
schema:
  $schema: 'https://json-schema.org/draft/2020-12/schema'
  type: object
  properties:
    db:
      type: object
      description: 'PostgreSQL connection (from resource picker, required if use_cache=True)'
      default: null
      properties: {}
    east:
      type: number
      description: Eastern longitude bound
      default: null
    north:
      type: number
      description: Northern latitude bound
      default: null
    south:
      type: number
      description: Southern latitude bound
      default: null
    store_s3:
      type: boolean
      description: Write result to S3 and return reference (default True)
      default: true
    types:
      type: array
      description: >-
        Feature types to fetch (all 15 Overture types supported): building,
        building_part, land, water, land_use, land_cover, infrastructure, place,
        segment, connector, address, division, division_area, division_boundary,
        bathymetry
      default:
        - building
      items:
        type: string
        enum:
          - building
          - building_part
          - land
          - water
          - land_use
          - land_cover
          - infrastructure
          - bathymetry
          - place
          - segment
          - connector
          - address
          - division
          - division_area
          - division_boundary
      originalType: 'string[]'
    use_cache:
      type: boolean
      description: Use PostgreSQL spatial cache for faster queries (default True)
      default: true
    west:
      type: number
      description: Western longitude bound
      default: null
  required:
    - west
    - south
    - east
    - north
tag: ''

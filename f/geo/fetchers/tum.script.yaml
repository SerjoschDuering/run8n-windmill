summary: Fetch TUM 3D building heights
description: >-
  Fetches building heights from TUM Global 3D Building Model WFS. Gracefully
  handles service unavailability.
lock: '!inline f/geo/fetchers/tum.script.lock'
kind: script
schema:
  $schema: 'https://json-schema.org/draft/2020-12/schema'
  type: object
  properties:
    east:
      type: number
      description: Eastern longitude bound
      default: null
    north:
      type: number
      description: Northern latitude bound
      default: null
    south:
      type: number
      description: Southern latitude bound
      default: null
    west:
      type: number
      description: Western longitude bound
      default: null
  required:
    - west
    - south
    - east
    - north

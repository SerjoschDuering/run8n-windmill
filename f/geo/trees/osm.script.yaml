summary: 'Fetch OSM trees via Overpass API'
description: 'Fetches tree points from OpenStreetMap with fallback endpoints. Returns GeoJSON with height estimation cascade.'
lock: '!inline osm.script.lock'
kind: script
schema:
  $schema: 'https://json-schema.org/draft/2020-12/schema'
  type: object
  properties:
    west:
      type: number
      description: 'Western longitude bound'
    south:
      type: number
      description: 'Southern latitude bound'
    east:
      type: number
      description: 'Eastern longitude bound'
    north:
      type: number
      description: 'Northern latitude bound'
  required:
    - west
    - south
    - east
    - north

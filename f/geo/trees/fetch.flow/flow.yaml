summary: Fetch trees from multiple sources and merge
description: >
  Fetches tree data from OSM + OpenTrees in parallel.

  Merges with deduplication based on spatial proximity.


  Area limit: 5 km² (use allow_large_area=true to bypass)

  Typical runtime: ~5-15s for small areas, ~30s for 4km²


  Webhook: POST
  https://windmill.run8n.xyz/api/w/windmill_automations/jobs/run_wait_result/f/geo/trees/fetch


  Height Priority:

  1. OpenTrees measured height (municipal surveys)

  2. OSM height tag (direct measurement)

  3. OSM diameter_crown estimate

  4. OSM circumference estimate (allometric)

  5. Genus-based default

  6. Urban average (8m)


  Output Properties (app-compatible):

  - Height: meters (capital H)

  - Diameter: canopy diameter meters (capital D)

  - GlobalID: unique identifier
value:
  modules:
    - id: validate
      value:
        type: rawscript
        content: '!inline inline_script_0.inline_script.py'
        input_transforms:
          allow_large_area:
            type: javascript
            expr: flow_input.allow_large_area || false
          east:
            type: javascript
            expr: flow_input.east
          north:
            type: javascript
            expr: flow_input.north
          south:
            type: javascript
            expr: flow_input.south
          west:
            type: javascript
            expr: flow_input.west
        lock: '!inline inline_script_0.inline_script.lock'
        language: python3
    - id: fetch_all
      value:
        type: branchall
        branches:
          - summary: Fetch OSM trees
            modules:
              - id: osm
                value:
                  type: script
                  input_transforms:
                    east:
                      type: javascript
                      expr: flow_input.east
                    north:
                      type: javascript
                      expr: flow_input.north
                    south:
                      type: javascript
                      expr: flow_input.south
                    west:
                      type: javascript
                      expr: flow_input.west
                  path: f/geo/trees/osm
                retry:
                  constant:
                    attempts: 2
                    seconds: 5
                  exponential:
                    attempts: 0
                    multiplier: 1
                    random_factor: null
                    seconds: 0
            expr: ''
            parallel: true
            skip_failure: true
          - summary: Fetch OpenTrees data
            modules:
              - id: opentrees
                value:
                  type: script
                  input_transforms:
                    east:
                      type: javascript
                      expr: flow_input.east
                    north:
                      type: javascript
                      expr: flow_input.north
                    south:
                      type: javascript
                      expr: flow_input.south
                    west:
                      type: javascript
                      expr: flow_input.west
                  path: f/geo/trees/opentrees
            expr: ''
            parallel: true
            skip_failure: true
        parallel: true
    - id: merge
      value:
        type: script
        input_transforms:
          opentrees_geojson:
            type: javascript
            expr: |
              results.fetch_all[1] || null
          osm_geojson:
            type: javascript
            expr: >
              results.fetch_all[0] || { type: "FeatureCollection", features: []
              }
        path: f/geo/trees/merge
  failure_module:
    id: on_error
    value:
      type: rawscript
      content: |
        def main(error: dict):
            return {
                "type": "FeatureCollection",
                "features": [],
                "metadata": {
                    "source": "flow_error",
                    "error": str(error),
                    "status": "failed"
                }
            }
      input_transforms: {}
      lock: |
        # py: 3.12
      language: python3
schema:
  $schema: 'https://json-schema.org/draft/2020-12/schema'
  type: object
  properties:
    allow_large_area:
      type: boolean
      description: 'Allow areas > 5 km² (slower, may hit rate limits)'
      default: false
    east:
      type: number
      description: Eastern longitude bound
    north:
      type: number
      description: Northern latitude bound
    south:
      type: number
      description: Southern latitude bound
    west:
      type: number
      description: Western longitude bound
  required:
    - west
    - south
    - east
    - north

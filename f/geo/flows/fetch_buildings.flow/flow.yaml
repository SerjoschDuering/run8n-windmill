summary: Fetch buildings from multiple sources and merge heights
description: >
  Fetches building footprints from OSM + TUM + Overture in parallel.

  Merges heights with priority: Overture > TUM > OSM > estimated.


  Area limit: 5 km² (use allow_large_area=true to bypass)

  Typical runtime: ~5-10s for small areas, ~30s for 4km²


  Webhook: POST
  https://windmill.run8n.xyz/api/w/windmill_automations/jobs/run_wait_result/f/geo/flows/fetch_buildings


  Height Priority:

  1. Overture height (direct measurement)

  2. TUM measured height

  3. OSM height tag

  4. Overture num_floors * 3

  5. OSM building:levels * 3

  6. Estimate by building type/area
value:
  modules:
    - id: validate
      value:
        type: rawscript
        content: '!inline inline_script_0.inline_script.py'
        input_transforms:
          allow_large_area:
            type: javascript
            expr: flow_input.allow_large_area || false
          east:
            type: javascript
            expr: flow_input.east
          north:
            type: javascript
            expr: flow_input.north
          south:
            type: javascript
            expr: flow_input.south
          west:
            type: javascript
            expr: flow_input.west
        lock: '!inline inline_script_0.inline_script.lock'
        language: python3
    - id: fetch_all
      value:
        type: branchall
        branches:
          - summary: Fetch OSM buildings
            modules:
              - id: osm
                value:
                  type: script
                  input_transforms:
                    east:
                      type: javascript
                      expr: flow_input.east
                    north:
                      type: javascript
                      expr: flow_input.north
                    south:
                      type: javascript
                      expr: flow_input.south
                    west:
                      type: javascript
                      expr: flow_input.west
                  path: f/geo/fetchers/osm
                retry:
                  constant:
                    attempts: 2
                    seconds: 5
                  exponential:
                    attempts: 0
                    multiplier: 1
                    random_factor: null
                    seconds: 0
            expr: ''
            parallel: true
            skip_failure: true
          - summary: Fetch TUM buildings
            modules:
              - id: tum
                value:
                  type: script
                  input_transforms:
                    east:
                      type: javascript
                      expr: flow_input.east
                    north:
                      type: javascript
                      expr: flow_input.north
                    south:
                      type: javascript
                      expr: flow_input.south
                    west:
                      type: javascript
                      expr: flow_input.west
                  path: f/geo/fetchers/tum
            expr: ''
            parallel: true
            skip_failure: true
          - summary: Fetch Overture buildings
            modules:
              - id: overture
                value:
                  type: script
                  input_transforms:
                    east:
                      type: javascript
                      expr: flow_input.east
                    north:
                      type: javascript
                      expr: flow_input.north
                    south:
                      type: javascript
                      expr: flow_input.south
                    west:
                      type: javascript
                      expr: flow_input.west
                  path: f/geo/fetchers/overture
            expr: ''
            parallel: true
            skip_failure: true
        parallel: true
    - id: merge
      value:
        type: script
        input_transforms:
          osm_geojson:
            type: javascript
            expr: >
              results.fetch_all[0] || { type: "FeatureCollection", features: []
              }
          overture_geojson:
            type: javascript
            expr: |
              results.fetch_all[2] || null
          tum_geojson:
            type: javascript
            expr: |
              results.fetch_all[1] || null
        path: f/geo/processors/merge_heights
  failure_module:
    id: on_error
    value:
      type: rawscript
      content: |
        def main(error: dict):
            return {
                "type": "FeatureCollection",
                "features": [],
                "metadata": {
                    "source": "flow_error",
                    "error": str(error),
                    "status": "failed"
                }
            }
      input_transforms: {}
      lock: |
        # py: 3.12
      language: python3
schema:
  $schema: 'https://json-schema.org/draft/2020-12/schema'
  type: object
  properties:
    allow_large_area:
      type: boolean
      description: 'Allow areas > 5 km² (slower, may hit rate limits)'
      default: false
    east:
      type: number
      description: Eastern longitude bound
    north:
      type: number
      description: Northern latitude bound
    south:
      type: number
      description: Southern latitude bound
    west:
      type: number
      description: Western longitude bound
  required:
    - west
    - south
    - east
    - north

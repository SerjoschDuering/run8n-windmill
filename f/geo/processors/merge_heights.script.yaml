summary: 'Merge building heights from multiple sources'
description: 'Matches buildings by centroid and applies height priority: Overture > TUM > OSM > estimated.'
lock: '!inline merge_heights.script.lock'
kind: script
schema:
  $schema: 'https://json-schema.org/draft/2020-12/schema'
  type: object
  properties:
    osm_geojson:
      type: object
      description: 'OSM buildings GeoJSON FeatureCollection (required base)'
      properties: {}
    tum_geojson:
      type: object
      description: 'TUM buildings GeoJSON (optional)'
      properties: {}
    overture_geojson:
      type: object
      description: 'Overture buildings GeoJSON (optional)'
      properties: {}
  required:
    - osm_geojson

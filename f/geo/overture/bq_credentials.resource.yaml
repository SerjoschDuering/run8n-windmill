# GCP credentials for BigQuery Overture Maps fetcher
#
# Setup instructions:
# 1. Create a GCP service account with "BigQuery User" role
# 2. Generate a JSON key file
# 3. Fill in the values below
# 4. Create this as a Windmill resource via UI or wmill CLI
#
# Resource type: object
# Resource path: f/geo/overture/bq_credentials

value:
  project_id: "your-gcp-project-id"
  credentials_json:
    type: "service_account"
    project_id: "your-gcp-project-id"
    private_key_id: "..."
    private_key: "-----BEGIN PRIVATE KEY-----\n...\n-----END PRIVATE KEY-----\n"
    client_email: "your-sa@your-project.iam.gserviceaccount.com"
    client_id: "..."
    auth_uri: "https://accounts.google.com/o/oauth2/auth"
    token_uri: "https://oauth2.googleapis.com/token"
    auth_provider_x509_cert_url: "https://www.googleapis.com/oauth2/v1/certs"
    client_x509_cert_url: "https://www.googleapis.com/robot/v1/metadata/x509/..."

resource_type: object
